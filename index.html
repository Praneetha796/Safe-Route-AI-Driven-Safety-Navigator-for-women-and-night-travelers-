<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeRoute – Voice Enabled Safety Navigation</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Your CSS -->
<link rel="stylesheet" href="css/style.css">
  
<style>
#map {
  height: 300px;
  width: 100%;
}
</style>
</head>

<body class="p-4 min-h-screen bg-gray-50">

<header class="mb-6">
<h1 class="text-3xl font-bold text-pink-700">SafeRoute AI</h1>
<p class="text-gray-500 text-sm">
AI-based Safe Navigation for Women & Night Travelers
</p>
</header>

<main class="grid lg:grid-cols-3 gap-6">

<!-- LEFT SIDE -->
<div class="lg:col-span-2 space-y-6">

<!-- SAFE ROUTE -->
<div class="bg-white shadow-lg p-6 rounded-xl">
<h2 class="text-xl font-bold mb-3">Safe Route Navigation</h2>

<div class="flex justify-between bg-gray-100 p-3 rounded-lg text-sm">
<span>AI Decision:</span>
<span id="route-status" class="text-gray-500">
Waiting for command…
</span>
</div>

<button onclick="findSafestRoute()"
class="w-full mt-3 p-3 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl font-semibold">
Start Safe Route
</button>

<div id="map" class="mt-4 rounded-lg"></div>

<p class="text-xs text-gray-500 mt-2">
Say: <b>“start safe route”</b>
</p>
</div>

<!-- SOS -->
<div class="bg-white shadow-lg p-6 rounded-xl text-center">
<h2 class="text-red-600 font-bold text-lg mb-2">Emergency SOS</h2>

<button id="sosBtn" onclick="toggleSOS()"
class="w-full h-28 rounded-full bg-pink-500 hover:bg-red-600 text-white text-2xl font-bold transition">
PANIC
</button>

<p id="sosText" class="mt-2 text-sm text-gray-600">
Say: <b>“help”</b> or <b>“emergency”</b>
</p>
</div>

</div>

<!-- RIGHT SIDE -->
<div class="space-y-6">

<!-- VOICE -->
<div class="bg-white shadow-lg p-6 rounded-xl">
<h3 class="font-bold mb-1">Voice Assistant</h3>
<p class="text-sm">
Status:
<span id="voiceStatus" class="text-green-600 font-semibold">Listening…</span>
</p>
</div>

<!-- CONTACTS -->
<div class="bg-white shadow-lg p-6 rounded-xl">
<h3 class="font-bold mb-2">Emergency Contacts</h3>

<form onsubmit="addContact(event)" class="space-y-2">
<input id="contactName" placeholder="Name"
class="w-full p-2 border rounded" required>

<input id="contactPhone" placeholder="Phone Number"
class="w-full p-2 border rounded" required>

<button class="w-full bg-pink-500 hover:bg-pink-600 text-white p-2 rounded">
Add Contact
</button>
</form>

<ul id="contactList" class="mt-3 text-sm space-y-1"></ul>
</div>

<!-- LOG -->
<div class="bg-white shadow-lg p-6 rounded-xl">
<h3 class="font-bold mb-2">System Log</h3>
<div id="log" class="h-56 overflow-y-auto bg-gray-50 p-2 rounded text-xs"></div>
</div>

</div>
</main>

<!-- Your JS -->
<script src="js/script.js"></script>

</body>
</html>
